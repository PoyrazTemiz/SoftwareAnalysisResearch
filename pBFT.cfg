CONSTANTS
  N = 4
  F = 1
  Clients = {"c1"}
  Ops = {"op1"}
  Timestamps = {1}
  Views = {0, 1}
  MaxSeq = 1
  StateDigests = {"s0", "s1"}
  WindowSize = 2

  \* There has to be enough seq numbers for client requests and each timestamp used once

SPECIFICATION PBSpec

INVARIANT PBTypeOK
INVARIANT NoConflictingPrePrepare
INVARIANT NoConflictingStableCheckpoints
INVARIANT NoConflictingCommittedAcrossViews
INVARIANT NewViewOnlyAboveCheckpoint

PROPERTY RequestSuccess
